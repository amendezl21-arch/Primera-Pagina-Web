<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <!-- Link FontAwesome -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="CSS/login.css">
</head>
<body>

    <div class="login-container">
        <div class="usuario-container">
            <i class="fa-regular fa-user"></i>
        </div>
        <!-- Formulario que pide ingresar usuario y contraseña -->
        <form class="login">
            <div class="ingresar-form">
                <input type="text" placeholder="Usuario">
            </div>
            <div class="ingresar-form">
                <input type="password" placeholder="************">
            </div>

            <!-- Botón para ir a "recuperar.html" -->
            <div class="ingresar-opciones">
                <a href="recuperar.html" class="contraseña-olvidada">Olvidaste la Contraseña?</a>
            </div>
            <!-- Botón de Ingresar -->
            <button type="submit" class="boton-ingresar">INGRESAR</button>

            <!-- Link para ir a "registro.html" -->
            <div class="registrar-link">
                <p>¿No tienes cuenta? <a href="registro.html"><strong>Registrarme</strong></a></p>
            </div>
            <div class="volver-inicio">
            <a href="index.html">Volver a la página principal</a>
            </div>
        </form>
    </div>

</body>
</html>
